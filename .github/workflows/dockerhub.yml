name: Build and Push Docker Images

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ai-first-crm-server:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/ai-first-crm-server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push client image
        uses: docker/build-push-action@v6
        with:
          context: ./client
          push: true
          build-args: |
            VITE_API_BASE_URL=http://localhost:8000/api/v1
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ai-first-crm-client:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/ai-first-crm-client:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
